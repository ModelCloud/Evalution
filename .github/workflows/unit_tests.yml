name: Unit Tests

defaults:
  run:
    shell: bash -le {0}

on:
  repository_dispatch:
  workflow_dispatch:
    inputs:
      ref:
        description: "GitHub ref: Branch, Tag or Commit SHA"
        required: false
        default: ""
      test_regex:
        description: "Regex to filter test files"
        required: false
        default: ""
      max-parallel:
        description: "Parallel jobs"
        required: false
        default: "8"

env:
  ref: ${{ github.event.inputs.ref || github.ref }}
  CUDA_DEVICE_ORDER: PCI_BUS_ID
  CUDA_VERSION: 130
  UV_TORCH_BACKEND: cu130
  TORCH_VERSION: 2.11.0
  PYTHON_VERSION: 3.14t
  UV_PYTHON: 3.14t
  PYTHON_GIL: 0
  RUNNER: 10.0.13.31
  HF_TOKEN: ${{ secrets.HF_TOKEN }}

concurrency:
  group: ${{ github.event.inputs.ref || github.ref }}-workflow-unit-tests
  cancel-in-progress: true

jobs:
  list-test-files:
    runs-on: ubuntu-latest
    outputs:
      files: ${{ steps.files.outputs.files }}
      max-parallel: ${{ steps.config.outputs.max-parallel }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
        with:
          ref: ${{ env.ref }}

      - name: Set matrix config
        id: config
        run: |
          python3 .github/scripts/ci_workflow.py set-matrix-config \
            --max-parallel "${{ github.event.inputs['max-parallel'] || '8' }}"

      - name: List test files
        id: files
        run: |
          python3 .github/scripts/ci_workflow.py list-tests \
            --test-regex "${{ github.event.inputs.test_regex || '' }}"

  test:
    needs: list-test-files
    if: needs.list-test-files.outputs.files != '[]'
    strategy:
      fail-fast: false
      max-parallel: ${{ fromJSON(needs.list-test-files.outputs.max-parallel) }}
      matrix:
        test-file: ${{ fromJSON(needs.list-test-files.outputs.files) }}
    runs-on: [ self-hosted, xeon5 ]
    container:
      image: 10.0.13.31:5000/nvidia/cuda:132-ubuntu24.04_0325
      volumes:
        - /monster/ci/env/entrypoint.sh:/entrypoint.sh
        - /monster/ci/env/entrypoint.sh:/etc/profile.d/01-entrypoint.sh
        - /dev/dri/by-path:/dev/dri/by-path
        - /monster/ci/models:/monster/data/model
        - /monster/ci/dataset:/monster/data/model/dataset
        - /monster/ci/huggingface:/github/home/.cache/huggingface
        - /monster/ci/uv:/opt/uv
        # - /monster/ci/uv/setup_uv_venv.sh:/opt/uv/setup_uv_venv.sh
        # - /monster/ci/uv/uv:/opt/uv/uv
        # - /monster/ci/uv/uvx:/opt/uv/uvx
        # - /monster/ci/uv/env:/opt/uv/env
        # - /monster/ci/uv/uv.toml:/opt/uv/uv.toml
        - /monster/ci/env:/opt/env
        - /monster/ci/dist:/opt/dist
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
        with:
          ref: ${{ env.ref }}

      - name: Set test metadata
        id: meta
        run: |
          source /opt/uv/setup_uv_venv.sh evalution_unit_pre_env 3.14t
          uv pip install pyyaml -U
          python3 .github/scripts/ci_workflow.py set-test-metadata \
            --test-file "${{ matrix.test-file }}"

      - name: Activate uv env
        run: |
          safe_ref=$(printf '%s' "${{ env.ref }}" | sed 's/[\\/]/_/g')

          python3 .github/scripts/ci_workflow.py activate-uv-env \
            --test-file "${{ matrix.test-file }}" \
            --safe-name "${SAFE_NAME}_$safe_ref" \
            --cuda-version "${{ env.CUDA_VERSION }}" \
            --torch-version "${{ env.TORCH_VERSION }}" \
            --python-version "${PYTHON_VERSION}" \
            --uv-python "${UV_PYTHON}"


      - name: Setup uv env
        run: |
          python3 .github/scripts/ci_workflow.py setup-uv-env \
            --cuda-version "${{ env.CUDA_VERSION }}" \
            --torch-version "${{ env.TORCH_VERSION }}" \
            --uv-python "${UV_PYTHON}"

      - name: Print uv env
        run: |
          python3 .github/scripts/ci_workflow.py print-uv-env

      - name: Find suitable GPU
        if: ${{ steps.meta.outputs.requires-gpu == 'true' }}
        env:
          BASE_URL: http://10.0.14.249
        run: |
          python3 .github/scripts/ci_gpu.py allocate \
            --base-url "$BASE_URL" \
            --run-id "${{ github.run_id }}" \
            --test "${{ matrix.test-file }}" \
            --runner "${{ runner.name }}" \
            --count "1" \
            --require-single

      - name: Run test
        env:
          BASE_URL: http://10.0.14.249
        run: |
          python3 .github/scripts/ci_workflow.py prepare-test-run
          python3 .github/scripts/ci_tests.py run \
            --base-url "$BASE_URL" \
            --run-id "${{ github.run_id }}" \
            --test-file "${{ matrix.test-file }}" \
            --runner "${{ runner.name }}" \
            --gpu-id "${CUDA_VISIBLE_DEVICES:-}" \
            ${{ steps.meta.outputs.requires-gpu == 'true' && '--enable-keepalive-monitor' || '' }} \
            --artifacts-dir artifacts

      - name: Release GPU
        if: ${{ always() && steps.meta.outputs.requires-gpu == 'true' }}
        env:
          BASE_URL: http://10.0.14.249
        run: |
          python3 .github/scripts/ci_workflow.py release-gpu-if-present \
            --base-url "$BASE_URL" \
            --run-id "${{ github.run_id }}" \
            --cuda-visible-devices "${CUDA_VISIBLE_DEVICES:-}" \
            --step-timestamp "${STEP_TIMESTAMP:-}" \
            --test-file "${{ matrix.test-file }}" \
            --runner "${{ runner.name }}"

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: unit-test-results-${{ steps.meta.outputs.safe-name }}
          path: artifacts/*
          if-no-files-found: ignore
