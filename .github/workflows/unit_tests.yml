name: Unit Tests

defaults:
  run:
    shell: bash -le {0}

on:
  push:
  pull_request:
  repository_dispatch:
  workflow_dispatch:
    inputs:
      ref:
        description: "GitHub ref: Branch, Tag or Commit SHA"
        required: false
        default: ""

env:
  ref: ${{ github.event.inputs.ref || github.ref }}
  CUDA_VERSION: 131
  UV_TORCH_BACKEND: cu130
  TORCH_VERSION: 2.10.0
  PYTHON_VERSION: 3.14t
  UV_PYTHON: python3.14t
  UV_INDEX_URL: http://10.0.14.249/simple

concurrency:
  group: ${{ github.event.inputs.ref || github.ref }}-workflow-unit-tests
  cancel-in-progress: true

jobs:
  test:
    runs-on: [ self-hosted, xeon5 ]
    container:
      image: 10.0.13.31:5000/nvidia/cuda:131-ubuntu22.04_0206
      volumes:
        - /monster/ci/env/entrypoint.sh:/entrypoint.sh
        - /monster/ci/env/entrypoint.sh:/etc/profile.d/01-entrypoint.sh
        - /monster/ci/uv:/opt/uv
        - /monster/ci/env:/opt/env
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
        with:
          ref: ${{ env.ref }}


      - name: Activate uv env
        run: |
          env_name="cu${{ env.CUDA_VERSION }}_torch${{ env.TORCH_VERSION }}_py${PYTHON_VERSION}_release"
          /opt/uv/setup_uv_venv.sh $env_name

      - name: Setup uv env
        run: |
          /opt/env/init_compiler_torch_only.sh ${{ env.CUDA_VERSION }} ${{ env.TORCH_VERSION }} ${UV_PYTHON}

      - name: Print uv env
        run: |
          echo "::group::uv python list"
          uv python list
          ls -ahl /opt/uv/venvs
          echo "::endgroup::"
          
          echo "== python =="
          python --version
          which python
          which pip || true

          echo "== nvcc =="
          nvcc --version

          echo "::group::pip list"
          uv pip list
          echo "::endgroup::"

          echo "== torch =="
          uv pip show torch || true

          echo "::group::project files"
          ls -ahl
          echo "::endgroup::"

          echo "::group::git status"
          git config --global --add safe.directory $(pwd)
          git status
          echo "::endgroup::"

      - name: Run tests
        run: |
          if [ ! -d tests ]; then
            echo "::error::tests/ directory not found."
            exit 1
          fi
          
          uv pip install .
          uv pip install -U pytest datasets
          
          echo "::group::pip list"
          uv pip list
          echo "::endgroup::"
          
          mkdir -p artifacts
          pytest --durations=0 tests --junitxml=artifacts/unit-tests.xml

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: unit-test-results
          path: artifacts/*
          if-no-files-found: ignore
