name: Unit Tests

defaults:
  run:
    shell: bash -le {0}

on:
  repository_dispatch:
  workflow_dispatch:
    inputs:
      ref:
        description: "GitHub ref: Branch, Tag or Commit SHA"
        required: false
        default: ""
      test_regex:
        description: "Regex to filter test files"
        required: false
        default: ""
      max-parallel:
        description: "Parallel jobs"
        required: false
        default: "8"

env:
  ref: ${{ github.event.inputs.ref || github.ref }}
  CUDA_DEVICE_ORDER: PCI_BUS_ID
  CUDA_VERSION: 130
  UV_TORCH_BACKEND: cu130
  TORCH_VERSION: 2.11.0
  PYTHON_VERSION: 3.14t
  UV_PYTHON: 3.14t
  PYTHON_GIL: 0
  RUNNER: 10.0.13.31
  HF_TOKEN: ${{ secrets.HF_TOKEN }}

concurrency:
  group: ${{ github.event.inputs.ref || github.ref }}-workflow-unit-tests
  cancel-in-progress: true

jobs:
  list-test-files:
    runs-on: ubuntu-latest
    outputs:
      files: ${{ steps.files.outputs.files }}
      max-parallel: ${{ steps.config.outputs.max-parallel }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
        with:
          ref: ${{ env.ref }}

      - name: Set matrix config
        id: config
        run: |
          echo "max-parallel=${{ github.event.inputs['max-parallel'] || '8' }}" >> "$GITHUB_OUTPUT"

      - name: List test files
        id: files
        env:
          TEST_REGEX: ${{ github.event.inputs.test_regex || '' }}
        run: |
          python3 - <<'PY'
          import json
          import os
          import pathlib
          import re

          root = pathlib.Path("tests")
          pattern = os.environ.get("TEST_REGEX", "")
          regex = re.compile(pattern) if pattern else None

          def sort_key(path: pathlib.Path) -> tuple[int, str]:
            # Prioritize direct children of tests/ before nested test files.
            rel = path.relative_to(root)
            return (len(rel.parts), path.as_posix())

          files = []
          for path in sorted(root.rglob("test_*.py"), key=sort_key):
            rel = path.as_posix()
            if regex and not regex.search(rel):
              continue
            files.append(rel)

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as fh:
            print(f"files={json.dumps(files)}", file=fh)

          print("Matched test files:")
          for rel in files:
            print(rel)
          PY

  test:
    needs: list-test-files
    if: needs.list-test-files.outputs.files != '[]'
    strategy:
      fail-fast: false
      max-parallel: ${{ fromJSON(needs.list-test-files.outputs.max-parallel) }}
      matrix:
        test-file: ${{ fromJSON(needs.list-test-files.outputs.files) }}
    runs-on: [ self-hosted, xeon5 ]
    container:
      image: 10.0.13.31:5000/nvidia/cuda:132-ubuntu24.04_0325
      volumes:
        - /monster/ci/env/entrypoint.sh:/entrypoint.sh
        - /monster/ci/env/entrypoint.sh:/etc/profile.d/01-entrypoint.sh
        - /dev/dri/by-path:/dev/dri/by-path
        - /monster/ci/models:/monster/data/model
        - /monster/ci/dataset:/monster/data/model/dataset
        - /monster/ci/huggingface:/github/home/.cache/huggingface
        # - /monster/ci/uv:/opt/uv
        - /monster/ci/uv/setup_uv_venv.sh:/opt/uv/setup_uv_venv.sh
        - /monster/ci/uv/uv:/opt/uv/uv
        - /monster/ci/uv/uvx:/opt/uv/uvx
        - /monster/ci/uv/env:/opt/uv/env
        - /monster/ci/uv/uv.toml:/opt/uv/uv.toml
        - /monster/ci/env:/opt/env
        - /monster/ci/dist:/opt/dist
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
        with:
          ref: ${{ env.ref }}

      - name: Set test metadata
        id: meta
        run: |
          test_file="${{ matrix.test-file }}"
          safe_name="${test_file//\//__}"
          safe_name="${safe_name//./_}"
          requires_gpu="true"
          if grep -q '^# GPU=-1$' "$test_file"; then
            requires_gpu="false"
          fi
          echo "SAFE_NAME=$safe_name" >> "$GITHUB_ENV"
          echo "TEST_REQUIRES_GPU=$requires_gpu" >> "$GITHUB_ENV"
          echo "safe-name=$safe_name" >> "$GITHUB_OUTPUT"
          echo "requires-gpu=$requires_gpu" >> "$GITHUB_OUTPUT"

      - name: Activate uv env
        run: |
          python_version="${PYTHON_VERSION}"
          uv_python="${UV_PYTHON}"

          if [ "${{ matrix.test-file }}" = "tests/test_tensorrt_llm_engine.py" ]; then
            python_version="3.12"
            uv_python="3.12"
          fi

          echo "PYTHON_VERSION=$python_version" >> "$GITHUB_ENV"
          echo "UV_PYTHON=$uv_python" >> "$GITHUB_ENV"

          echo "::group::uv cache dir"
            uv cache dir
            ls $(uv cache dir)
          echo "::endgroup::"
          echo "::group::uv cache dir"
            printenv | grep UV_
          echo "::endgroup::"

          env_name="evalution_${SAFE_NAME}_cu${{ env.CUDA_VERSION }}_torch${{ env.TORCH_VERSION }}_py${python_version}_release"
          echo "source /opt/uv/setup_uv_venv.sh $env_name ${python_version}"
          source /opt/uv/setup_uv_venv.sh "$env_name" "${python_version}"
          python -VV

      - name: Setup uv env
        run: |
          
          /opt/env/init_compiler_torch_only.sh ${{ env.CUDA_VERSION }} ${{ env.TORCH_VERSION }} ${UV_PYTHON}

          if [ "${UV_PYTHON}" = "3.14t" ]; then
            uv pip install http://10.0.13.31/files/flash_attn/flash_attn-2.8.4-cp314-cp314t-linux_x86_64.whl
          elif [ "${UV_PYTHON}" = "3.12" ]; then
            echo "EVALUTION_SKIP_GIL_CHECK=1" >> "$GITHUB_ENV"
            uv pip install tensorrt_llm -U
            uv pip install http://10.0.13.31/files/flash_attn/flash_attn-2.8.4-cp312-cp312-linux_x86_64.whl
          else
            echo "== installing flash-attn =="
            uv pip install flash-attn
            uv pip show flash-attn
          fi
          uv pip install accelerate -U
          echo "== installing gptqmodel =="
          uv pip install gptqmodel -U
          uv pip show gptqmodel

      - name: Print uv env
        run: |
          echo "::group::uv python list"
          uv python list
          echo "::endgroup::"
          
          echo "== python =="
          python -VV
          which python
          which pip || true

          echo "== nvcc =="
          nvcc --version

          echo "::group::pip list"
          uv pip list
          echo "::endgroup::"

          echo "== torch =="
          uv pip show torch || true

          echo "::group::project files"
          ls -ahl
          echo "::endgroup::"

          echo "::group::git status"
          git config --global --add safe.directory $(pwd)
          git status
          echo "::endgroup::"

      - name: Find suitable GPU
        if: ${{ steps.meta.outputs.requires-gpu == 'true' }}
        env:
          BASE_URL: http://10.0.14.249
        run: |
          python3 .github/scripts/allocate_gpu.py \
            --base-url "$BASE_URL" \
            --run-id "${{ github.run_id }}" \
            --test "${{ matrix.test-file }}" \
            --runner "${{ runner.name }}" \
            --count "1" \
            --require-single

      - name: Run test
        env:
          BASE_URL: http://10.0.14.249
        run: |
          if [ ! -d tests ]; then
            echo "::error::tests/ directory not found."
            exit 1
          fi
          
          uv pip install .
          uv pip install -U pytest datasets rouge_score sglang pybase64
          
          echo "::group::pip list"
          uv pip list
          echo "::endgroup::"

          python .github/scripts/run_tests.py \
            --base-url "$BASE_URL" \
            --run-id "${{ github.run_id }}" \
            --test-file "${{ matrix.test-file }}" \
            --runner "${{ runner.name }}" \
            --gpu-id "${CUDA_VISIBLE_DEVICES:-}" \
            ${{ steps.meta.outputs.requires-gpu == 'true' && '--enable-keepalive-monitor' || '' }} \
            --artifacts-dir artifacts

      - name: Release GPU
        if: ${{ always() && steps.meta.outputs.requires-gpu == 'true' }}
        env:
          BASE_URL: http://10.0.14.249
        run: |
          if [ -n "${CUDA_VISIBLE_DEVICES:-}" ] && [ -n "${STEP_TIMESTAMP:-}" ]; then
            python3 .github/scripts/release_gpu.py \
              --base-url "$BASE_URL" \
              --run-id "${{ github.run_id }}" \
              --gpu-id "${CUDA_VISIBLE_DEVICES}" \
              --timestamp "${STEP_TIMESTAMP}" \
              --test "${{ matrix.test-file }}" \
              --runner "${{ runner.name }}"
          else
            echo "Skip GPU release because allocation metadata is missing."
          fi

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: unit-test-results-${{ steps.meta.outputs.safe-name }}
          path: artifacts/*
          if-no-files-found: ignore
