name: Unit Tests

defaults:
  run:
    shell: bash -le {0}

on:
  push:
  pull_request:
  repository_dispatch:
  workflow_dispatch:
    inputs:
      ref:
        description: "GitHub ref: Branch, Tag or Commit SHA"
        required: false
        default: ""
      test_regex:
        description: "Regex to filter test files"
        required: false
        default: ""
      max-parallel:
        description: "Parallel jobs"
        required: false
        default: "8"

env:
  ref: ${{ github.event.inputs.ref || github.ref }}
  CUDA_VERSION: 131
  UV_TORCH_BACKEND: cu130
  TORCH_VERSION: 2.10.0
  PYTHON_VERSION: 3.14t
  UV_PYTHON: 3.14t
  UV_INDEX_URL: http://10.0.14.249/simple
  PYTHON_GIL: 0

concurrency:
  group: ${{ github.event.inputs.ref || github.ref }}-workflow-unit-tests
  cancel-in-progress: true

jobs:
  list-test-files:
    runs-on: ubuntu-latest
    outputs:
      files: ${{ steps.files.outputs.files }}
      max-parallel: ${{ steps.config.outputs.max-parallel }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
        with:
          ref: ${{ env.ref }}

      - name: Set matrix config
        id: config
        run: |
          echo "max-parallel=${{ github.event.inputs['max-parallel'] || '8' }}" >> "$GITHUB_OUTPUT"

      - name: List test files
        id: files
        env:
          TEST_REGEX: ${{ github.event.inputs.test_regex || '' }}
        run: |
          python3 - <<'PY'
          import json
          import os
          import pathlib
          import re

          root = pathlib.Path("tests")
          pattern = os.environ.get("TEST_REGEX", "")
          regex = re.compile(pattern) if pattern else None

          files = []
          for path in sorted(root.rglob("test_*.py")):
            rel = path.as_posix()
            if regex and not regex.search(rel):
              continue
            files.append(rel)

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as fh:
            print(f"files={json.dumps(files)}", file=fh)

          print("Matched test files:")
          for rel in files:
            print(rel)
          PY

  test:
    needs: list-test-files
    if: needs.list-test-files.outputs.files != '[]'
    strategy:
      fail-fast: false
      max-parallel: ${{ fromJSON(needs.list-test-files.outputs.max-parallel) }}
      matrix:
        test-file: ${{ fromJSON(needs.list-test-files.outputs.files) }}
    runs-on: [ self-hosted, xeon5 ]
    container:
      image: 10.0.13.31:5000/nvidia/cuda:131-ubuntu22.04_0206
      volumes:
        - /monster/ci/env/entrypoint.sh:/entrypoint.sh
        - /monster/ci/env/entrypoint.sh:/etc/profile.d/01-entrypoint.sh
        - /monster/ci/uv:/opt/uv
        - /monster/ci/env:/opt/env
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
        with:
          ref: ${{ env.ref }}

      - name: Set test metadata
        id: meta
        run: |
          test_file="${{ matrix.test-file }}"
          safe_name="${test_file//\//__}"
          safe_name="${safe_name//./_}"
          echo "safe-name=$safe_name" >> "$GITHUB_OUTPUT"


      - name: Activate uv env
        run: |
          env_name="cu${{ env.CUDA_VERSION }}_torch${{ env.TORCH_VERSION }}_py${PYTHON_VERSION}_release"
          echo "env_name=$env_name"
          source /opt/uv/setup_uv_venv.sh $env_name
          python -VV

      - name: Setup uv env
        run: |
          /opt/env/init_compiler_torch_only.sh ${{ env.CUDA_VERSION }} ${{ env.TORCH_VERSION }} ${UV_PYTHON}

      - name: Print uv env
        run: |
          echo "::group::uv python list"
          uv python list
          ls -ahl /opt/uv/venvs
          echo "::endgroup::"
          
          echo "== python =="
          python --version
          which python
          which pip || true

          echo "== nvcc =="
          nvcc --version

          echo "::group::pip list"
          uv pip list
          echo "::endgroup::"

          echo "== torch =="
          uv pip show torch || true

          echo "::group::project files"
          ls -ahl
          echo "::endgroup::"

          echo "::group::git status"
          git config --global --add safe.directory $(pwd)
          git status
          echo "::endgroup::"

      - name: Run test
        run: |
          if [ ! -d tests ]; then
            echo "::error::tests/ directory not found."
            exit 1
          fi
          
          uv pip install .
          uv pip install -U pytest datasets rouge_score sglang
          
          echo "::group::pip list"
          uv pip list
          echo "::endgroup::"
          
          mkdir -p artifacts
          pytest --durations=0 "${{ matrix.test-file }}" --junitxml="artifacts/${{ steps.meta.outputs.safe-name }}.xml"

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: unit-test-results-${{ steps.meta.outputs.safe-name }}
          path: artifacts/*
          if-no-files-found: ignore
